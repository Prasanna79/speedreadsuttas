name = "palispeedread-worker"
main = "src/index.ts"
compatibility_date = "2025-07-18"
workers_dev = true

routes = [
  { pattern = "api.suttaspeed.com/*", custom_domain = true }
]

[vars]
ALLOWED_ORIGINS = "http://localhost:5173,https://suttaspeed.com,https://www.suttaspeed.com"

[[r2_buckets]]
binding = "SUTTA_TEXT"
bucket_name = "speedreadsuttas-data"
preview_bucket_name = "speedreadsuttas-data-preview"
