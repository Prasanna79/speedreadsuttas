name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      VITE_API_URL: https://api.suttaspeed.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Quality gates
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Deploy Worker
        run: pnpm --filter @palispeedread/worker run deploy

      - name: Deploy Pages
        run: pnpm --filter @palispeedread/worker exec wrangler pages deploy ../../packages/web/dist --project-name suttaspeed

      - name: Ensure Pages custom domains
        run: |
          DOMAIN_API="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/suttaspeed/domains"

          ensure_domain() {
            local domain="$1"
            if curl -fsS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "$DOMAIN_API" \
              | jq -e --arg domain "$domain" '.result[]? | select(.name == $domain)' > /dev/null; then
              echo "Domain already present: $domain"
              return 0
            fi

            echo "Creating domain: $domain"
            curl -fsS -X POST \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              "$DOMAIN_API" \
              --data "{\"name\":\"$domain\"}" \
              | jq -e '.success == true' > /dev/null
          }

          ensure_domain "suttaspeed.com"
          ensure_domain "www.suttaspeed.com"

  e2e:
    needs: deploy
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BASE_URL: https://suttaspeed.pages.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Wait for production URL
        run: |
          for i in {1..24}; do
            if curl -fsS "$PLAYWRIGHT_BASE_URL" > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Timed out waiting for $PLAYWRIGHT_BASE_URL"
          exit 1

      - name: Run E2E
        run: pnpm e2e

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
