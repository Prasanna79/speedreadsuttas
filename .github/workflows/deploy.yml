name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'marketing/**'
      - 'debug/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      VITE_API_URL: https://api.suttaspeed.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Quality gates
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Seed playtest sutta in R2
        run: pnpm data:seed-playtest

      - name: Deploy Worker
        run: pnpm --filter @palispeedread/worker run deploy

      - name: Verify playtest sutta API
        run: |
          for i in {1..20}; do
            payload="$(curl -fsS https://api.suttaspeed.com/api/v1/sutta/mn1/text/en/sujato || true)"
            if echo "$payload" | jq -e '.segments | length > 0' > /dev/null 2>&1; then
              exit 0
            fi
            sleep 3
          done
          echo "Playtest sutta mn1/en/sujato is unavailable from API"
          exit 1

      - name: Deploy Pages
        run: pnpm --filter @palispeedread/worker exec wrangler pages deploy ../../packages/web/dist --project-name suttaspeed

  e2e:
    needs: deploy
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BASE_URL: https://suttaspeed.pages.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Wait for production URL
        run: |
          for i in {1..24}; do
            if curl -fsS "$PLAYWRIGHT_BASE_URL" > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Timed out waiting for $PLAYWRIGHT_BASE_URL"
          exit 1

      - name: Run E2E
        run: pnpm e2e

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
